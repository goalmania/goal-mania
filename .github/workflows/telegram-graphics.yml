name: Telegram Graphics Cron

on:
  schedule:
    # Every 3 hours (UTC): 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00
    - cron: "0 */3 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  generate-graphics:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call generate-graphics endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://goal-mania.it/api/cron/generate-graphics" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP status: $response"

          if [ "$response" -ne 200 ]; then
            echo "❌ Endpoint returned $response"
            exit 1
          fi

          echo "✅ Graphics generated and sent to Telegram"
