name: Telegram Graphics Cron

on:
  schedule:
    # Every 30 minutes — 1 article per run, catch up quickly after publishing
    - cron: "*/30 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  generate-graphics:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call generate-graphics endpoint
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET "https://goal-mania.it/api/cron/generate-graphics" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          body_only=$(echo "$body" | grep -v "HTTP_STATUS:")

          echo "HTTP status: $status"
          echo "Response: $body_only"

          if [ "$status" -ne 200 ]; then
            echo "❌ Endpoint returned $status"
            exit 1
          fi

          echo "✅ Graphics generated and sent to Telegram"
