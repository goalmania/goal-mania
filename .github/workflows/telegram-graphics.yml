name: Telegram Graphics Cron

on:
  schedule:
    # Every 30 minutes — 1 article per run, catch up quickly after publishing
    - cron: "*/30 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  generate-graphics:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call generate-graphics endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://goal-mania.it/api/cron/generate-graphics" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP status: $response"

          if [ "$response" -ne 200 ]; then
            echo "❌ Endpoint returned $response"
            exit 1
          fi

          echo "✅ Graphics generated and sent to Telegram"
