name: Telegram Graphics Cron

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  generate-graphics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Send batch 1 (up to 3 articles)
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET "https://goal-mania.it/api/cron/generate-graphics" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          body_only=$(echo "$body" | grep -v "HTTP_STATUS:")

          echo "HTTP status: $status"
          echo "Response: $body_only"

          if [ "$status" -ne 200 ]; then
            echo "❌ Endpoint returned $status"
            exit 1
          fi
          echo "✅ Batch 1 done"

      - name: Wait 15s between batches
        run: sleep 15

      - name: Send batch 2 (eventuali arretrati)
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET "https://goal-mania.it/api/cron/generate-graphics" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          body_only=$(echo "$body" | grep -v "HTTP_STATUS:")

          echo "HTTP status: $status"
          echo "Response: $body_only"

          if [ "$status" -ne 200 ]; then
            echo "❌ Endpoint returned $status"
            exit 1
          fi
          echo "✅ Batch 2 done"
